{% extends "base_app.html" %}
{% block title %}Candidates{% endblock %}
{% block main_class %}layout-list{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Candidates</h1>
</div>

<div data-sync-table="candidates"
     data-sync-search-fields="name,email"
     data-sync-default-sort="updatedAt:desc"
     data-sync-filter-fields='[{"key":"stages","label":"Stage","type":"select","options":["screening","test","interview","offer","hired","rejected","withdrawn","on_hold"]},{"key":"currentPosition","label":"Position","type":"text"},{"key":"name","label":"Name","type":"text"},{"key":"email","label":"Email","type":"text"}]'
     data-sync-display-options='{"sort":[{"value":"updatedAt:desc","label":"Newest first","type":"date"},{"value":"updatedAt:asc","label":"Oldest first","type":"date"},{"value":"name:asc","label":"Name A-Z"},{"value":"name:desc","label":"Name Z-A"}],"group":[{"value":"stages","label":"Stage"}]}'>
    <div class="table-controls">
        <input type="text" data-table-search placeholder="Search by name or email..." class="table-search">
        <a href="/candidate/new" class="btn-icon sync-add-btn" title="Add candidate" hx-boost="false"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></a>
    </div>
    <div class="sync-subcontrols"></div>

    <div class="sync-table-wrap">
        <table class="table-clean">
            <tbody></tbody>
        </table>
        <span class="table-count"></span>
    </div>
</div>

<noscript>
    <p class="row-meta" style="padding:2rem; text-align:center;">JavaScript is required to load candidates.</p>
</noscript>

<script src="/static/cells.js?v=1"></script>
<script>
window.__syncConfig = {
    renderRow: function(r) {
        var stages = (r.stages || '').split(',').filter(Boolean);
        return '<tr class="clickable-row" data-href="/candidate/' + r.id + '">' +
            C.text(r.name, r.email) +
            '<td><div class="col-primary">' + (r.currentPosition || '—') + '</div>' +
            '<div class="row-meta">' + (stages.length ? C.multiBadge(stages, 3).replace(/<\/?td[^>]*>/g, '') : '—') + '</div></td>' +
            C.compound([(r.pipelineCount || 0) + ' pipeline' + (r.pipelineCount !== 1 ? 's' : ''), (r.sessionCount || 0) + ' session' + (r.sessionCount !== 1 ? 's' : '')]) +
            C.action('candidate', r.id, r.commentCount) +
            C.date(r.updatedAt) +
            '</tr>';
    },
    contextMenu: function(r, baseUrl) {
        var items = [];
        // Utility
        items.push({label: '⎘ Copy email', copy: r.email});
        // Mutate
        items.push({label: '✎ Edit candidate', href: '/candidate/' + r.id + '/edit'});
        items.push({label: '+ Add interview', href: '/session/new?candidate_id=' + r.id});
        return items;
    }
};
</script>
<script src="/static/sync-list.js?v=2"></script>
{% endblock %}
