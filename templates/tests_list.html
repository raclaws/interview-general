{% extends "base_app.html" %}
{% block title %}Tests{% endblock %}
{% block main_class %}layout-list{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Tests</h1>
</div>

<div data-sync-table="tests"
     data-sync-search-fields="candidateName,title,position"
     data-sync-archive-field="status"
     data-sync-archive-values="submitted,cancelled"
     data-sync-default-sort="createdAt:desc"
     data-sync-filter-fields='[{"key":"status","label":"Status","type":"select","options":["pending","opened","submitted","cancelled"]},{"key":"candidateName","label":"Candidate","type":"text"},{"key":"position","label":"Position","type":"text"},{"key":"businessUnit","label":"Business Unit","type":"text"}]'
     data-sync-display-options='{"sort":[{"value":"createdAt:desc","label":"Newest first","type":"date"},{"value":"createdAt:asc","label":"Oldest first","type":"date"},{"value":"candidateName:asc","label":"Candidate A-Z"}],"group":[{"value":"status","label":"Status"},{"value":"businessUnit","label":"Business Unit"}]}'>
    <div class="table-controls">
        <input type="text" data-table-search placeholder="Search candidate or test title..." class="table-search">
        <a href="/test/new" class="btn-icon sync-add-btn" title="Assign test" hx-boost="false"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></a>
    </div>
    <div class="sync-subcontrols">
        <button type="button" class="archive-pill">Show completed</button>
    </div>

    <div class="sync-table-wrap">
        <table class="table-clean">
            <tbody></tbody>
        </table>
        <span class="table-count"></span>
    </div>
</div>

<noscript>
    <p class="row-meta" style="padding:2rem; text-align:center;">JavaScript is required to load tests.</p>
</noscript>

<script src="/static/cells.js?v=1"></script>
<script>
window.__syncConfig = {
    renderRow: function(r) {
        return '<tr class="clickable-row" data-href="/pipeline/' + r.pipelineId + '">' +
            C.text(r.title, (r.candidateName || '—') + ' · ' + (r.position || '—')) +
            C.badge(r.status) +
            C.date(r.deadline, 'Due:') +
            C.action('pipeline', r.pipelineId, r.commentCount) +
            C.date(r.createdAt) +
            '</tr>';
    },
    contextMenu: function(r, baseUrl) {
        var items = [];
        // Navigate
        items.push({label: '↗ View pipeline', href: '/pipeline/' + r.pipelineId});
        items.push({label: '↗ View candidate', href: '/candidate/' + r.candidateId});
        // Utility
        items.push({label: '⎘ Copy test link', copy: baseUrl + '/t/' + r.token});
        // Destruct
        if (r.status === 'pending' || r.status === 'opened') items.push({label: '⊘ Cancel', href: '/pipeline/' + r.pipelineId + '/test/' + r.id + '/cancel', confirm: 'Cancel this test?'});
        return items;
    },
    bulkActions: [
        {label: 'Cancel', action: 'cancel', confirm: 'Cancel selected tests?'}
    ]
};
</script>
<script src="/static/sync-list.js?v=2"></script>
{% endblock %}
