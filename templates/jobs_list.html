{% extends "base_app.html" %}
{% block title %}Jobs{% endblock %}
{% block main_class %}layout-list{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Jobs</h1>
</div>

<div data-sync-table="jobs"
     data-sync-search-fields="title,buName,recruiter"
     data-sync-archive-field="status"
     data-sync-archive-values="closed,cancelled"
     data-sync-default-sort="updatedAt:desc"
     data-sync-filter-fields='[{"key":"status","label":"Status","type":"select","options":["open","on_hold","closed","cancelled"]},{"key":"priority","label":"Priority","type":"select","options":["urgent","high","normal","low"]},{"key":"buName","label":"Business Unit","type":"select","options":[{% for bu in bu_names %}"{{ bu }}"{% if not loop.last %},{% endif %}{% endfor %}]},{"key":"recruiter","label":"Recruiter","type":"text"}]'
     data-sync-display-options='{"sort":[{"value":"updatedAt:desc","label":"Newest first","type":"date"},{"value":"updatedAt:asc","label":"Oldest first","type":"date"},{"value":"title:asc","label":"Title A-Z"},{"value":"title:desc","label":"Title Z-A"}],"group":[{"value":"status","label":"Status"},{"value":"buName","label":"Business Unit"},{"value":"priority","label":"Priority"}]}'>
    <div class="table-controls">
        <input type="text" data-table-search placeholder="Search jobs..." class="table-search">
        <a href="/job/new" class="btn-icon sync-add-btn" title="New job"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></a>
    </div>
    <div class="sync-subcontrols">
        <button type="button" class="archive-pill">Show closed</button>
    </div>

    <div class="sync-table-wrap">
        <table class="table-clean">
            <tbody></tbody>
        </table>
        <span class="table-count"></span>
    </div>
</div>

<noscript>
    <p class="row-meta" style="padding:2rem; text-align:center;">JavaScript is required to load jobs.</p>
</noscript>

<script>
window.__syncConfig = {
    renderRow: function(r) {
        var priorityBadge = '';
        if (r.priority === 'urgent') priorityBadge = '<span class="badge badge-urgent">Urgent</span>';
        else if (r.priority === 'high') priorityBadge = '<span class="badge badge-high">High</span>';
        return '<tr class="clickable-row" data-href="/job/' + r.id + '">' +
            '<td><div class="col-primary">' + (r.title || '—') + '</div>' +
            '<div class="row-meta">' + (r.jobType || '') + ' · ' + (r.buName || '—') + (r.recruiter ? ' · ' + r.recruiter : '') + '</div></td>' +
            '<td style="text-align:right;"><span class="badge badge-' + r.status + '">' + (r.status || '').replace(/_/g, ' ') + '</span></td>' +
            '<td style="text-align:right; white-space:nowrap;"><span class="row-meta">' + (r.filled || 0) + '/' + (r.headcount || 1) + ' filled · ' + (r.pipelineCount || 0) + ' candidates</span></td>' +
            '<td class="peek-trigger" onclick="event.stopPropagation(); openPeek(\'job\', ' + r.id + ')"><span class="peek-icon">' + (r.commentCount || '') + ' <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span></td>' +
            '<td style="text-align:right;">' + priorityBadge + '</td>' +
            '</tr>';
    },
    contextMenu: function(r, baseUrl) {
        var items = [];
        items.push({label: '✎ Edit', href: '/job/' + r.id + '/edit'});
        items.push({label: '+ Add candidate', href: '/job/' + r.id + '#add-candidate'});
        items.push({label: '↗ View pipelines', href: '/pipelines?af=jobTitle:contains:' + encodeURIComponent(r.title)});
        if (r.status === 'open' || r.status === 'on_hold') items.push({label: '⊘ Close job', href: '/job/' + r.id + '/close', confirm: 'Close this job?'});
        if (r.status === 'closed' || r.status === 'cancelled') items.push({label: '↺ Reopen', href: '/job/' + r.id + '/reopen', confirm: 'Reopen this job?'});
        items.push({label: '✕ Delete', href: '/job/' + r.id + '/delete', confirm: 'Delete this job permanently?', 'delete': true});
        return items;
    }
};
</script>
<script src="/static/sync-list.js?v=2"></script>
{% endblock %}
