<div class="detail-section report-result">
    <div class="detail-section-label" style="display: flex; justify-content: space-between; align-items: center;">
        <span>Report Generated</span>
        <div style="display: flex; gap: 0.5rem;">
            <a href="/static/reports/{{ filename }}" target="_blank" class="btn-ghost" style="font-size: 0.75rem; text-decoration: none;">↗ Open in Tab</a>
            <a href="/static/reports/{{ filename }}" download class="btn-ghost" style="font-size: 0.75rem; text-decoration: none;">↓ Download</a>
        </div>
    </div>
    <iframe src="/static/reports/{{ filename }}" onload="this.style.height=(this.contentDocument.body.scrollHeight+40)+'px'" style="width: 100%; max-width: 900px; height: 400px; border: 1px solid var(--border); border-radius: var(--radius-md); background: #f7f6f2;"></iframe>
</div>
