<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}INS ATS{% endblock %}</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/style.css?v=9">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="/static/shortcuts.js?v=2"></script>
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar" id="sidebar">
            <button class="sidebar-close" onclick="document.getElementById('sidebar').classList.remove('sidebar-open')"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
            <div class="sidebar-brand">INS<br>ATS</div>
            <nav class="sidebar-nav" hx-boost="true" hx-target="#main" hx-select="#main" hx-swap="outerHTML" hx-push-url="true">
                <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">
                    <svg class="sidebar-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg> Dashboard
                </a>
                <a href="/jobs" class="{% if request.url.path.startswith('/job') and '/job-types' not in request.url.path %}active{% endif %}">
                    <svg class="sidebar-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 12h.01"/><path d="M16 6V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><path d="M22 13a18.15 18.15 0 0 1-20 0"/><rect width="20" height="14" x="2" y="6" rx="2"/></svg> Jobs
                </a>
                <a href="/candidates" class="{% if request.url.path.startswith('/candidate') %}active{% endif %}">
                    <svg class="sidebar-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> Candidates
                </a>
                <a href="/pipelines" class="{% if request.url.path.startswith('/pipeline') %}active{% endif %}">
                    <svg class="sidebar-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M6 21V9a9 9 0 0 0 9 9"/></svg> Pipelines
                </a>
                <div class="sidebar-group" id="eval-group">
                    <button class="sidebar-group-toggle" onclick="this.parentElement.classList.toggle('collapsed')">
                        <svg class="sidebar-icon" xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg> Evaluation
                    </button>
                    <div class="sidebar-group-items">
                        <a href="/sessions" class="{% if request.url.path.startswith('/session') %}active{% endif %}">
                            <svg class="sidebar-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="18" x="8" y="3" rx="1"/><path d="M12 7h.01"/><path d="M12 11h.01"/><path d="M12 15h.01"/></svg> Interview
                        </a>
                        <a href="/tests" class="{% if request.url.path == '/tests' %}active{% endif %}">
                            <svg class="sidebar-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> Tests
                        </a>
                        <a href="/review-batches" class="{% if request.url.path.startswith('/review') %}active{% endif %}">
                            <svg class="sidebar-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg> Review
                        </a>
                    </div>
                </div>
                <a href="/settings" class="{% if request.url.path.startswith('/settings') or request.url.path.startswith('/templates') %}active{% endif %}">
                    <svg class="sidebar-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg> Settings
                </a>
            </nav>
            <div class="sidebar-footer">
                <form method="post" action="/logout">
                    <button type="submit" class="sidebar-logout"><svg class="sidebar-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg> Logout</button>
                </form>
            </div>
        </aside>
        <div class="main-content {% block main_class %}{% endblock %}" id="main" hx-boost="true" hx-target="#main" hx-select="#main" hx-swap="outerHTML" hx-push-url="true">
            <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('sidebar-open')"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg></button>
            {% block breadcrumb %}{% endblock %}
            {% block content %}{% endblock %}
        </div>
    </div>
<aside id="peek-panel"></aside>
<script>
// Toast notification system
(function() {
    var container = document.createElement('div');
    container.className = 'toast-container';
    document.body.appendChild(container);

    window.toast = function(message, severity) {
        var el = document.createElement('div');
        el.className = 'toast' + (severity ? ' toast-' + severity : '');
        el.textContent = message;
        container.appendChild(el);
        requestAnimationFrame(function() { el.classList.add('show'); });
        setTimeout(function() {
            el.classList.remove('show');
            el.classList.add('hide');
            setTimeout(function() { el.remove(); }, 250);
        }, 2500);
        // Max 3 visible
        var toasts = container.querySelectorAll('.toast');
        if (toasts.length > 3) toasts[0].remove();
    };

    document.body.addEventListener('toast', function(e) {
        var detail = e.detail;
        if (typeof detail === 'string') { toast(detail); return; }
        toast(detail.value || detail.message || '', detail.severity || '');
    });

    // CLA-43: Update row data-stage after inline select swap
    document.body.addEventListener('htmx:afterSettle', function(e) {
        var sel = e.detail.elt;
        if (sel.tagName === 'SELECT' && sel.name === 'stage') {
            var row = sel.closest('tr');
            if (row) row.dataset.stage = sel.value;
        }
    });
})();

document.addEventListener('click', function(e) {
    var row = e.target.closest('.clickable-row');
    if (row && !e.target.closest('a, button, select, input, form')) {
        if (e.ctrlKey || e.shiftKey) return;
        window.location.href = row.dataset.href;
    }
    // Close any open context menu
    var menu = document.getElementById('ctx-menu');
    if (menu) menu.style.display = 'none';
});

// Close dropdown menus on outside click
document.addEventListener('click', function(e) {
    document.querySelectorAll('.dropdown-menu.show').forEach(function(menu) {
        if (!menu.parentElement.contains(e.target)) {
            menu.classList.remove('show');
        }
    });
});

// Context menu
(function() {
    var menu = document.createElement('div');
    menu.id = 'ctx-menu';
    menu.className = 'ctx-menu';
    menu.style.display = 'none';
    document.body.appendChild(menu);
    var ctxRow = null;

    document.addEventListener('contextmenu', function(e) {
        var row = e.target.closest('.clickable-row[data-ctx]');
        if (!row) { menu.style.display = 'none'; return; }
        e.preventDefault();
        ctxRow = row;
        var items = JSON.parse(row.dataset.ctx);
        menu.innerHTML = items.map(function(it) {
            var cls = it.confirm ? 'ctx-item ctx-danger' : 'ctx-item';
            if (it.confirm && it.delete) {
                return '<form method="post" action="' + it.href + '" hx-post="' + it.href + '" hx-swap="none" hx-confirm="' + it.confirm + '" data-ctx-delete style="margin:0;"><button type="submit" class="' + cls + '">' + it.label + '</button></form>';
            }
            if (it.confirm) {
                return '<form method="post" action="' + it.href + '" hx-post="' + it.href + '" hx-target="this" hx-swap="outerHTML" hx-confirm="' + it.confirm + '" style="margin:0;"><button type="submit" class="' + cls + '">' + it.label + '</button></form>';
            }
            if (it.copy) {
                return '<div class="' + cls + '" data-copy="' + it.copy + '">' + it.label + '</div>';
            }
            return '<a href="' + it.href + '" class="' + cls + '">' + it.label + '</a>';
        }).join('');
        menu.style.left = e.pageX + 'px';
        menu.style.top = e.pageY + 'px';
        menu.style.display = 'block';
        htmx.process(menu);

        // Copy handler
        menu.querySelectorAll('[data-copy]').forEach(function(el) {
            el.onclick = function() {
                navigator.clipboard.writeText(el.dataset.copy);
                menu.style.display = 'none';
                toast('Copied to clipboard');
            };
        });
    });

    // Remove row on successful delete from context menu
    document.body.addEventListener('htmx:afterRequest', function(e) {
        if (!e.detail.successful) return;
        if (e.detail.elt.closest('[data-ctx-delete]') && ctxRow) {
            menu.style.display = 'none';
            ctxRow.style.transition = 'opacity 0.2s';
            ctxRow.style.opacity = '0';
            setTimeout(function() { ctxRow.remove(); ctxRow = null; }, 200);
        } else if (e.detail.elt.closest('.ctx-menu')) {
            menu.style.display = 'none';
        }
    });
})();

// Update sidebar active state after hx-boost navigation
document.body.addEventListener('htmx:pushedIntoHistory', function() {
    var path = window.location.pathname;
    document.querySelectorAll('.sidebar-nav a').forEach(function(a) {
        var href = a.getAttribute('href');
        var isActive = (href === '/' && path === '/') ||
            (href !== '/' && path.startsWith(href));
        a.classList.toggle('active', isActive);
    });
});

// Peek panel
window.openPeek = function(type, id) {
    var panel = document.getElementById('peek-panel');
    panel.classList.add('peek-open');
    htmx.ajax('GET', '/peek/' + type + '/' + id, {target: '#peek-panel', swap: 'innerHTML'});
};
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') document.getElementById('peek-panel').classList.remove('peek-open');
});
document.addEventListener('click', function(e) {
    var panel = document.getElementById('peek-panel');
    if (panel.classList.contains('peek-open') && !panel.contains(e.target) && !e.target.closest('.peek-trigger')) {
        panel.classList.remove('peek-open');
    }
});

// Tab-focus freshness — detect stale detail pages
(function() {
    var meta = document.querySelector('meta[name="entity"]');
    if (!meta) return;
    var type = meta.dataset.type;
    var id = meta.dataset.id;
    var rendered = parseInt(meta.dataset.ts || '0', 10);
    if (!type || !id || !rendered) return;

    document.addEventListener('visibilitychange', function() {
        if (document.hidden) return;
        fetch('/peek/' + type + '/' + id + '/version')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.ts > rendered) {
                    toast('This page has been updated');
                    meta.dataset.ts = data.ts;
                }
            })
            .catch(function() {});
    });
})();

// Undo delete
(function() {
    var _undoStack = []; // persistent stack, max 10
    var _undoToast = null;
    var _toastTimer = null;
    var MAX_UNDO = 10;

    window.undoableDelete = function(type, id, label) {
        _undoStack.push({ type: type, id: id, label: label });
        if (_undoStack.length > MAX_UNDO) _undoStack.shift();

        // Show toast (5s visual feedback)
        if (_undoToast) { clearTimeout(_toastTimer); _undoToast.remove(); }
        _undoToast = document.createElement('div');
        _undoToast.className = 'toast toast-undo show';
        _undoToast.innerHTML = 'Deleted ' + label + ' <button class="undo-btn" onclick="window.undoLast()">Undo</button>';
        document.querySelector('.toast-container').appendChild(_undoToast);
        _toastTimer = setTimeout(function() {
            if (_undoToast) { _undoToast.classList.remove('show'); _undoToast.classList.add('hide'); setTimeout(function() { if (_undoToast) _undoToast.remove(); _undoToast = null; }, 250); }
        }, 5000);
    };

    window.undoLast = function() {
        if (!_undoStack.length) return;
        var item = _undoStack.pop();
        if (_undoToast) { clearTimeout(_toastTimer); _undoToast.remove(); _undoToast = null; }
        fetch('/restore/' + item.type + '/' + item.id, { method: 'POST', credentials: 'include' })
            .then(function(r) {
                if (r.ok) {
                    toast('Restored: ' + item.label);
                    setTimeout(function() { location.reload(); }, 300);
                } else { toast('Restore failed', 'warning'); _undoStack.push(item); }
            });
    };

    // Ctrl+Z — persistent, reads from stack (no timer dependency)
    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey && _undoStack.length) {
            e.preventDefault();
            window.undoLast();
        }
    });

    document.body.addEventListener('undoable-delete', function(e) {
        var d = e.detail;
        if (d && d.type && d.id) window.undoableDelete(d.type, d.id, d.label || d.type);
    });

    // Persist undo across redirects (detail page → list)
    document.body.addEventListener('htmx:beforeRedirect', function() {
        if (_undoStack.length) {
            sessionStorage.setItem('_pendingUndo', JSON.stringify(_undoStack[_undoStack.length - 1]));
        }
    });
    var pending = sessionStorage.getItem('_pendingUndo');
    if (pending) {
        sessionStorage.removeItem('_pendingUndo');
        try {
            var d = JSON.parse(pending);
            window.undoableDelete(d.type, d.id, d.label || d.type);
        } catch(e) {}
    }
})();
</script>
</body>
</html>
