<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Interview Form{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="/static/table.js?v=2"></script>
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">Interview<br>Summarizer</div>
            <nav class="sidebar-nav">
                <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">
                    <span class="sidebar-icon">◻</span> Dashboard
                </a>
                <a href="/sessions" class="{% if '/session' in request.url.path %}active{% endif %}">
                    <span class="sidebar-icon">▤</span> Interview
                </a>
                <a href="/pipelines" class="{% if '/pipeline' in request.url.path and '/candidate' not in request.url.path %}active{% endif %}">
                    <span class="sidebar-icon">⊟</span> Pipelines
                </a>
                <a href="/candidates" class="{% if '/candidate' in request.url.path %}active{% endif %}">
                    <span class="sidebar-icon">👤</span> Candidates
                </a>
                <a href="/settings" class="{% if '/settings' in request.url.path or '/templates' in request.url.path %}active{% endif %}">
                    <span class="sidebar-icon">⚙</span> Settings
                </a>
            </nav>
            <div class="sidebar-footer">
                <form method="post" action="/logout">
                    <button type="submit" class="sidebar-logout">↩ Logout</button>
                </form>
            </div>
        </aside>
        <div class="main-content">
            <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('sidebar-open')">☰</button>
            {% block breadcrumb %}{% endblock %}
            {% block content %}{% endblock %}
        </div>
    </div>
<script>
// Toast notification system
(function() {
    var container = document.createElement('div');
    container.className = 'toast-container';
    document.body.appendChild(container);

    window.toast = function(message) {
        var el = document.createElement('div');
        el.className = 'toast';
        el.textContent = message;
        container.appendChild(el);
        requestAnimationFrame(function() { el.classList.add('show'); });
        setTimeout(function() {
            el.classList.remove('show');
            el.classList.add('hide');
            setTimeout(function() { el.remove(); }, 250);
        }, 2500);
        // Max 3 visible
        var toasts = container.querySelectorAll('.toast');
        if (toasts.length > 3) toasts[0].remove();
    };

    document.body.addEventListener('toast', function(e) {
        toast(e.detail.value || e.detail);
    });

    // CLA-43: Update row data-stage after inline select swap, re-run table grouping
    document.body.addEventListener('htmx:afterSettle', function(e) {
        var sel = e.detail.elt;
        if (sel.tagName === 'SELECT' && sel.name === 'stage') {
            var row = sel.closest('tr');
            if (row) {
                row.dataset.stage = sel.value;
                var table = row.closest('[data-table]');
                if (table) table.dispatchEvent(new Event('table:refresh'));
            }
        }
    });
})();

document.addEventListener('click', function(e) {
    var row = e.target.closest('.clickable-row');
    if (row && !e.target.closest('a, button, select, input, form')) {
        window.location.href = row.dataset.href;
    }
    // Close any open context menu
    var menu = document.getElementById('ctx-menu');
    if (menu) menu.style.display = 'none';
});

// Close dropdown menus on outside click
document.addEventListener('click', function(e) {
    document.querySelectorAll('.dropdown-menu.show').forEach(function(menu) {
        if (!menu.parentElement.contains(e.target)) {
            menu.classList.remove('show');
        }
    });
});

// Context menu
(function() {
    var menu = document.createElement('div');
    menu.id = 'ctx-menu';
    menu.className = 'ctx-menu';
    menu.style.display = 'none';
    document.body.appendChild(menu);
    var ctxRow = null;

    document.addEventListener('contextmenu', function(e) {
        var row = e.target.closest('.clickable-row[data-ctx]');
        if (!row) { menu.style.display = 'none'; return; }
        e.preventDefault();
        ctxRow = row;
        var items = JSON.parse(row.dataset.ctx);
        menu.innerHTML = items.map(function(it) {
            var cls = it.confirm ? 'ctx-item ctx-danger' : 'ctx-item';
            if (it.confirm && it.delete) {
                return '<form method="post" action="' + it.href + '" hx-post="' + it.href + '" hx-swap="none" data-ctx-delete onsubmit="return confirm(\'' + it.confirm + '\')" style="margin:0;"><button type="submit" class="' + cls + '">' + it.label + '</button></form>';
            }
            if (it.confirm) {
                return '<form method="post" action="' + it.href + '" hx-post="' + it.href + '" hx-target="this" hx-swap="outerHTML" onsubmit="return confirm(\'' + it.confirm + '\')" style="margin:0;"><button type="submit" class="' + cls + '">' + it.label + '</button></form>';
            }
            if (it.copy) {
                return '<div class="' + cls + '" data-copy="' + it.copy + '">' + it.label + '</div>';
            }
            return '<a href="' + it.href + '" class="' + cls + '">' + it.label + '</a>';
        }).join('');
        menu.style.left = e.pageX + 'px';
        menu.style.top = e.pageY + 'px';
        menu.style.display = 'block';
        htmx.process(menu);

        // Copy handler
        menu.querySelectorAll('[data-copy]').forEach(function(el) {
            el.onclick = function() {
                navigator.clipboard.writeText(el.dataset.copy);
                menu.style.display = 'none';
                toast('Copied to clipboard');
            };
        });
    });

    // Remove row on successful delete from context menu
    document.body.addEventListener('htmx:afterRequest', function(e) {
        if (!e.detail.successful) return;
        if (e.detail.elt.closest('[data-ctx-delete]') && ctxRow) {
            menu.style.display = 'none';
            ctxRow.style.transition = 'opacity 0.2s';
            ctxRow.style.opacity = '0';
            setTimeout(function() { ctxRow.remove(); ctxRow = null; }, 200);
        } else if (e.detail.elt.closest('.ctx-menu')) {
            menu.style.display = 'none';
        }
    });
})();
</script>
</body>
</html>
