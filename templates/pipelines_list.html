{% extends "base_app.html" %}
{% block title %}Pipelines{% endblock %}
{% block main_class %}layout-list{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Pipelines</h1>
</div>

<div data-sync-table="pipelines"
     data-sync-search-fields="candidateName,jobTitle"
     data-sync-archive-field="stage"
     data-sync-archive-values="hired,rejected"
     data-sync-default-sort="updatedAt:desc"
     data-sync-filter-fields='[{"key":"stage","label":"Stage","type":"select","options":["screening","test","interview","offer","hired","rejected","withdrawn","on_hold"]},{"key":"businessUnit","label":"Business Unit","type":"select","options":[{% for bu in bu_names %}"{{ bu }}"{% if not loop.last %},{% endif %}{% endfor %}]},{"key":"candidateName","label":"Candidate","type":"text"},{"key":"jobTitle","label":"Job","type":"text"}]'
     data-sync-display-options='{"sort":[{"value":"updatedAt:desc","label":"Newest first","type":"date"},{"value":"updatedAt:asc","label":"Oldest first","type":"date"},{"value":"candidateName:asc","label":"Name A-Z"},{"value":"candidateName:desc","label":"Name Z-A"}],"group":[{"value":"stage","label":"Stage"},{"value":"businessUnit","label":"Business Unit"}]}'>
    <div class="table-controls">
        <input type="text" data-table-search placeholder="Search candidate name..." class="table-search">
    </div>
    <div class="sync-subcontrols">
        <button type="button" class="archive-pill">Show completed</button>
    </div>

    <div class="sync-table-wrap">
        <table class="table-clean">
            <tbody></tbody>
        </table>
        <span class="table-count"></span>
    </div>
</div>

<noscript>
    <p class="row-meta" style="padding:2rem; text-align:center;">JavaScript is required to load pipelines.</p>
</noscript>

<script>
var STAGES = ["screening","test","interview","offer","hired","rejected","withdrawn","on_hold"];

window.__syncConfig = {
    renderRow: function(r) {
        var stageOptions = STAGES.map(function(s) {
            var sel = s === r.stage ? ' selected' : '';
            return '<option value="' + s + '"' + sel + '>' + s.replace(/_/g, ' ').replace(/\b\w/g, function(c){return c.toUpperCase();}) + '</option>';
        }).join('');

        var testInfo = r.testTotal
            ? '<span style="color:var(--text-secondary);font-size:0.8rem;">T ' + r.testSubmitted + '/' + r.testTotal + '</span>'
            : '<span class="row-meta">—</span>';

        var scoreInfo = (r.hrAvg || r.cultureAvg)
            ? '<span class="row-meta">HR ' + r.hrAvg + ' · C ' + r.cultureAvg + '</span>'
            : '<span class="row-meta">—</span>';

        var date = r.updatedAt ? new Date(r.updatedAt).toLocaleDateString() : '';

        return '<tr class="clickable-row" data-href="/pipeline/' + r.id + '">' +
            '<td><div class="col-primary">' + (r.candidateName || '—') + '</div>' +
            '<div class="row-meta">' + (r.jobTitle || r.businessUnit || '—') + (r.displayName ? ' · ' + r.displayName : '') + '</div></td>' +
            '<td><select name="stage" class="inline-select" ' +
            'hx-post="/pipeline/' + r.id + '/stage" hx-target="this" hx-swap="outerHTML" hx-trigger="change" ' +
            'onclick="event.stopPropagation()">' + stageOptions + '</select></td>' +
            '<td>' + r.sessionCompleted + '/' + r.sessionTotal + '</td>' +
            '<td>' + testInfo + '</td>' +
            '<td>' + scoreInfo + '</td>' +
            '<td class="peek-trigger" onclick="event.stopPropagation(); openPeek(\'pipeline\', ' + r.id + ')"><span class="peek-icon">' + (r.commentCount || '') + ' <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span></td>' +
            '<td class="row-meta" style="text-align:right;">' + date + '</td>' +
            '</tr>';
    },
    contextMenu: function(r, baseUrl) {
        var items = [];
        items.push({label: '↗ View candidate', href: '/candidate/' + r.candidateId});
        items.push({label: '+ Add interview', href: '/session/new?candidate_id=' + r.candidateId + '&pipeline_id=' + r.id});
        items.push({label: '✕ Delete', href: '/pipeline/' + r.id + '/delete', confirm: 'Delete this pipeline entry?', 'delete': true});
        return items;
    }
};
</script>
<script src="/static/sync-list.js?v=2"></script>
{% endblock %}
