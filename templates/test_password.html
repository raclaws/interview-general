{% extends "base.html" %}
{% block title %}Test Access{% endblock %}
{% block content %}
<div class="form-container" style="max-width: 400px; margin: 4rem auto;">
    <h1 style="font-size: 1.25rem; margin-bottom: 1rem; text-align: center;">Enter Password</h1>
    <p class="row-meta" style="text-align: center; margin-bottom: 1.5rem;">Please enter the password provided to you to access your test.</p>

    {% if error %}
    <div class="alert alert-danger" style="margin-bottom: 1rem;">{{ error }}</div>
    {% endif %}

    <form method="post" action="/t/{{ token }}/auth" onsubmit="this.querySelector('button[type=submit]').disabled=true; this.querySelector('button[type=submit]').textContent='Verifying...'">
        <div class="form-group">
            <input type="text" name="password" required class="form-input" placeholder="Password" autocomplete="off" autofocus>
        </div>
        <button type="submit" class="btn" style="width: 100%;">Continue</button>
    </form>
</div>
{% endblock %}
