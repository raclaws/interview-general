{% extends "base_app.html" %}
{% block title %}New Task{% endblock %}
{% block breadcrumb %}
<nav class="breadcrumb">
    <a href="/tasks">Tasks</a> / <span>New</span>
</nav>
{% endblock %}
{% block content %}
<div class="page-header">
    <h1>New Task</h1>
</div>

<form method="post" action="/tasks/new" class="form-card" hx-boost="false">
    {% if request.query_params.get("error") %}
    <div class="form-error" style="margin-bottom: 1rem;">{{ request.query_params.get("error") }}</div>
    {% endif %}
    <div class="form-row">
        <div class="form-field">
            <label class="form-label">Title *</label>
            <input type="text" name="title" required class="form-input" maxlength="200" placeholder="e.g. Review CV, Schedule interview">
        </div>
    </div>

    <div class="form-row form-row--2col">
        <div class="form-field">
            <label class="form-label">Link to</label>
            <div class="toggle-group">
                <label class="toggle-label">
                    <input type="radio" name="entity_type" value="job" {% if prefill_type != "pipeline" %}checked{% endif %} onchange="document.getElementById('job-picker').style.display='block';document.getElementById('pipeline-picker').style.display='none';">
                    Job
                </label>
                <label class="toggle-label">
                    <input type="radio" name="entity_type" value="pipeline" {% if prefill_type == "pipeline" %}checked{% endif %} onchange="document.getElementById('job-picker').style.display='none';document.getElementById('pipeline-picker').style.display='block';">
                    Pipeline
                </label>
            </div>
        </div>
        <div class="form-field">
            <div id="job-picker" style="{% if prefill_type == 'pipeline' %}display:none{% endif %}">
                <label class="form-label">Job *</label>
                <select id="job-select-source" style="display:none">
                    {% for job in jobs %}
                    <option value="{{ job.id }}" {% if prefill_type == "job" and prefill_id == job.id %}selected{% endif %}>{{ job.title }}</option>
                    {% endfor %}
                </select>
                <div data-picker-name="entity_id" data-picker-source="job-select-source" data-picker-required {% if prefill_type == "job" and prefill_id %}data-picker-value="{{ prefill_id }}"{% endif %}>
                    <input type="text" class="picker-search form-input" placeholder="Search jobs..." aria-label="Search jobs">
                    <div class="picker-list" role="listbox"></div>
                </div>
            </div>
            <div id="pipeline-picker" style="{% if prefill_type != 'pipeline' %}display:none{% endif %}">
                <label class="form-label">Pipeline *</label>
                <select id="pipeline-select-source" style="display:none">
                    {% for p in pipeline_options %}
                    <option value="{{ p.id }}" {% if prefill_type == "pipeline" and prefill_id == p.id %}selected{% endif %}>{{ p.label }}</option>
                    {% endfor %}
                </select>
                <div data-picker-name="entity_id" data-picker-source="pipeline-select-source" data-picker-required {% if prefill_type == "pipeline" and prefill_id %}data-picker-value="{{ prefill_id }}"{% endif %}>
                    <input type="text" class="picker-search form-input" placeholder="Search pipelines..." aria-label="Search pipelines">
                    <div class="picker-list" role="listbox"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="form-row form-row--3col">
        <div class="form-field">
            <label class="form-label">Priority</label>
            <select name="priority" class="form-input">
                <option value="none">None</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
                <option value="urgent">Urgent</option>
            </select>
        </div>
        <div class="form-field">
            <label class="form-label">Due date</label>
            <input type="date" name="due_date" class="form-input">
        </div>
        <div class="form-field">
            <label class="form-label">Assigned to</label>
            <input type="text" name="assigned_to" class="form-input" placeholder="Name...">
        </div>
    </div>

    <div class="form-footer">
        <button type="submit" class="btn">Create Task</button>
        <a href="/tasks" class="btn-ghost">Cancel</a>
    </div>
</form>

<script>
(function() {
    var jobRadio = document.querySelector('input[name="entity_type"][value="job"]');
    var pipelineRadio = document.querySelector('input[name="entity_type"][value="pipeline"]');
    var jobPicker = document.getElementById('job-picker');
    var pipelinePicker = document.getElementById('pipeline-picker');

    function sync() {
        var jobHidden = jobPicker.querySelector('input[type="hidden"]');
        var pipHidden = pipelinePicker.querySelector('input[type="hidden"]');
        if (!jobHidden || !pipHidden) return;
        if (jobRadio.checked) {
            jobHidden.name = 'entity_id';
            pipHidden.removeAttribute('name');
        } else {
            pipHidden.name = 'entity_id';
            jobHidden.removeAttribute('name');
        }
    }
    jobRadio.addEventListener('change', sync);
    pipelineRadio.addEventListener('change', sync);
    // Run after picker.js has created hidden inputs
    if (document.readyState === 'complete') { sync(); }
    else { window.addEventListener('load', sync); }
})();
</script>
{% endblock %}
