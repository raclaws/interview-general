{% extends "base_app.html" %}
{% block title %}New Task{% endblock %}
{% block breadcrumb %}
<nav class="breadcrumb">
    <a href="/tasks">Tasks</a> / <span>New</span>
</nav>
{% endblock %}
{% block content %}
<div class="page-header">
    <h1>New Task</h1>
</div>

<form method="post" action="/tasks/new" class="form-card" hx-boost="false">
    <div class="form-row">
        <div class="form-field">
            <label class="form-label">Title *</label>
            <input type="text" name="title" required class="form-input" maxlength="200" placeholder="e.g. Review CV, Schedule interview">
        </div>
    </div>

    <div class="form-row form-row--2col">
        <div class="form-field">
            <label class="form-label">Link to</label>
            <div class="toggle-group">
                <label class="toggle-label">
                    <input type="radio" name="entity_type" value="job" {% if prefill_type != "pipeline" %}checked{% endif %} onchange="document.getElementById('job-picker').style.display='block';document.getElementById('pipeline-picker').style.display='none';">
                    Job
                </label>
                <label class="toggle-label">
                    <input type="radio" name="entity_type" value="pipeline" {% if prefill_type == "pipeline" %}checked{% endif %} onchange="document.getElementById('job-picker').style.display='none';document.getElementById('pipeline-picker').style.display='block';">
                    Pipeline
                </label>
            </div>
        </div>
        <div class="form-field">
            <div id="job-picker" style="{% if prefill_type == 'pipeline' %}display:none{% endif %}">
                <label class="form-label">Job *</label>
                <select name="entity_id" class="form-input" id="job-select">
                    <option value="">Select a job...</option>
                    {% for job in jobs %}
                    <option value="{{ job.id }}" {% if prefill_type == "job" and prefill_id == job.id %}selected{% endif %}>{{ job.title }}</option>
                    {% endfor %}
                </select>
            </div>
            <div id="pipeline-picker" style="{% if prefill_type != 'pipeline' %}display:none{% endif %}">
                <label class="form-label">Pipeline *</label>
                <select name="entity_id" class="form-input" id="pipeline-select" {% if prefill_type != "pipeline" %}disabled{% endif %}>
                    <option value="">Select a pipeline...</option>
                    {% for p in pipeline_options %}
                    <option value="{{ p.id }}" {% if prefill_type == "pipeline" and prefill_id == p.id %}selected{% endif %}>{{ p.label }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
    </div>

    <div class="form-row form-row--3col">
        <div class="form-field">
            <label class="form-label">Priority</label>
            <select name="priority" class="form-input">
                <option value="none">None</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
                <option value="urgent">Urgent</option>
            </select>
        </div>
        <div class="form-field">
            <label class="form-label">Due date</label>
            <input type="date" name="due_date" class="form-input">
        </div>
        <div class="form-field">
            <label class="form-label">Assigned to</label>
            <input type="text" name="assigned_to" class="form-input" placeholder="Name...">
        </div>
    </div>

    <div class="form-footer">
        <button type="submit" class="btn">Create Task</button>
        <a href="/tasks" class="btn-ghost">Cancel</a>
    </div>
</form>

<script>
(function() {
    var jobRadio = document.querySelector('input[name="entity_type"][value="job"]');
    var pipelineRadio = document.querySelector('input[name="entity_type"][value="pipeline"]');
    var jobSelect = document.getElementById('job-select');
    var pipelineSelect = document.getElementById('pipeline-select');

    function sync() {
        if (jobRadio.checked) {
            jobSelect.disabled = false;
            jobSelect.name = 'entity_id';
            pipelineSelect.disabled = true;
            pipelineSelect.removeAttribute('name');
        } else {
            pipelineSelect.disabled = false;
            pipelineSelect.name = 'entity_id';
            jobSelect.disabled = true;
            jobSelect.removeAttribute('name');
        }
    }
    jobRadio.addEventListener('change', sync);
    pipelineRadio.addEventListener('change', sync);
    sync();
})();
</script>
{% endblock %}
