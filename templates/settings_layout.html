{% extends "base_app.html" %}
{% block title %}Settings{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Settings</h1>
</div>

<div class="settings-shell">
    <nav class="settings-nav" hx-disinherit="*">
        <a href="/settings" class="settings-tab {% if active_tab == 'llm' %}active{% endif %}"
           hx-get="/settings" hx-target=".settings-content" hx-swap="innerHTML" hx-push-url="true">LLM</a>
        <a href="/settings/business-units" class="settings-tab {% if active_tab == 'business-units' %}active{% endif %}"
           hx-get="/settings/business-units" hx-target=".settings-content" hx-swap="innerHTML" hx-push-url="true">Business Units</a>
        <a href="/settings/positions" class="settings-tab {% if active_tab == 'positions' %}active{% endif %}"
           hx-get="/settings/positions" hx-target=".settings-content" hx-swap="innerHTML" hx-push-url="true">Positions</a>
        <a href="/settings/levels" class="settings-tab {% if active_tab == 'levels' %}active{% endif %}"
           hx-get="/settings/levels" hx-target=".settings-content" hx-swap="innerHTML" hx-push-url="true">Levels</a>
        <a href="/settings/job-types" class="settings-tab {% if active_tab == 'job-types' %}active{% endif %}"
           hx-get="/settings/job-types" hx-target=".settings-content" hx-swap="innerHTML" hx-push-url="true">Job Types</a>
        <a href="/templates" class="settings-tab {% if active_tab == 'templates' %}active{% endif %}" hx-boost="false">Templates</a>
        <a href="/settings/nocodb" class="settings-tab {% if active_tab == 'nocodb' %}active{% endif %}"
           hx-get="/settings/nocodb" hx-target=".settings-content" hx-swap="innerHTML" hx-push-url="true">NocoDB Sync</a>
        <a href="/settings/offer-config" class="settings-tab {% if active_tab == 'offer-config' %}active{% endif %}"
           hx-get="/settings/offer-config" hx-target=".settings-content" hx-swap="innerHTML" hx-push-url="true">Offer Calc</a>
        <a href="/settings/account" class="settings-tab {% if active_tab == 'account' %}active{% endif %}"
           hx-get="/settings/account" hx-target=".settings-content" hx-swap="innerHTML" hx-push-url="true">Account</a>
    </nav>
    <div class="settings-content" hx-disinherit="*">
        {% if tab_content %}
            {% include tab_content %}
        {% endif %}
    </div>
</div>

<style>
.settings-shell {
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: 2rem;
    min-height: 400px;
}
.settings-nav {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
}
.settings-tab {
    padding: 0.5rem 0.75rem;
    border-radius: var(--radius-md);
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 0.875rem;
    transition: background 0.1s;
}
.settings-tab:hover {
    background: var(--surface-hover);
    color: var(--text-primary);
}
.settings-tab.active {
    background: var(--surface-active);
    color: var(--text-primary);
    font-weight: 500;
}
.settings-content {
    min-width: 0;
}
</style>
{% endblock %}
