<h2 style="margin-bottom: 1rem;">{{ active_tab | replace("-", " ") | title }}</h2>

<table class="table-clean">
    <tbody>
        {% for item in items %}
        <tr>
            <td>
                <div class="col-primary">{{ item[label_field] }}</div>
                <div id="edit-{{ list_type }}-{{ item.id }}" style="display:none; margin-top: 0.5rem;">
                    <form method="post" action="/settings/{{ list_type }}/{{ item.id }}/edit"
                          hx-post="/settings/{{ list_type }}/{{ item.id }}/edit"
                          hx-target="closest .settings-content" hx-swap="innerHTML"
                          style="display: flex; gap: 0.5rem; align-items: center;">
                        <input type="text" name="value" value="{{ item[label_field] }}" required class="form-input" style="flex: 1; margin: 0;">
                        <button type="submit" class="btn" style="font-size: 0.8rem;">Save</button>
                        <button type="button" class="btn-ghost" style="font-size: 0.8rem;" onclick="document.getElementById('edit-{{ list_type }}-{{ item.id }}').style.display='none'">Cancel</button>
                    </form>
                </div>
            </td>
            <td style="text-align: right; white-space: nowrap;">
                <button class="btn-icon" title="Edit" onclick="var e=document.getElementById('edit-{{ list_type }}-{{ item.id }}'); e.style.display=e.style.display==='none'?'block':'none';">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
                </button>
                <form method="post" action="/settings/{{ list_type }}/{{ item.id }}/delete"
                      hx-post="/settings/{{ list_type }}/{{ item.id }}/delete"
                      hx-target="closest .settings-content" hx-swap="innerHTML"
                      hx-confirm="Remove '{{ item[label_field] }}'?"
                      style="display: inline;">
                    <button type="submit" class="btn-icon" title="Remove">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                    </button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% if not items %}
<p class="row-meta" style="padding: 1rem; text-align: center;">No items yet.</p>
{% endif %}

<form method="post" action="/settings/{{ list_type }}"
      hx-post="/settings/{{ list_type }}"
      hx-target="closest .settings-content" hx-swap="innerHTML"
      style="margin-top: 1rem; display: flex; gap: 0.5rem; align-items: end;">
    <div style="flex: 1;">
        <input type="text" name="value" required class="form-input" placeholder="Add new item...">
    </div>
    <button type="submit" class="btn">Add</button>
</form>

{% if list_type == "levels" %}
<p class="hint" style="margin-top: 0.5rem;">Order represents seniority rank (top = most junior).</p>
{% endif %}
