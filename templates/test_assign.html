{% extends "base_app.html" %}
{% block title %}Assign Test{% endblock %}
{% block breadcrumb %}
<nav class="breadcrumb">
    <a href="/candidates">Candidates</a> / <a href="/candidate/{{ candidate.id }}">{{ candidate.name }}</a> / <a href="/pipeline/{{ pipeline.id }}">{{ pipeline.display_name or "Pipeline" }}</a> / <span>Assign Test</span>
</nav>
{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Assign Test</h1>
</div>

<div class="form-container">
    <form method="post" action="/pipeline/{{ pipeline.id }}/assign-test" onsubmit="this.querySelector('button[type=submit]').disabled=true; this.querySelector('button[type=submit]').textContent='Assigning...'">
        <div class="form-group">
            <label class="form-label">Title <span class="required">*</span></label>
            <input type="text" name="title" required class="form-input" placeholder="e.g. HackerRank Backend Assessment">
        </div>

        <div class="form-group">
            <label class="form-label">External URL <span class="required">*</span></label>
            <input type="url" name="external_url" required class="form-input" placeholder="https://www.hackerrank.com/test/...">
        </div>

        <div class="form-group">
            <label class="form-label">Instructions</label>
            <textarea name="instructions" rows="4" class="form-input" placeholder="Instructions shown to the candidate before taking the test..."></textarea>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label class="form-label">Time Limit (days)</label>
                <input type="number" name="time_limit" min="1" class="form-input" placeholder="e.g. 3">
            </div>

            <div class="form-group">
                <label class="form-label">Max Upload Size (MB)</label>
                <input type="number" name="max_upload_size" min="1" class="form-input" placeholder="e.g. 10">
            </div>

            <div class="form-group">
                <label class="form-label">Deadline</label>
                <input type="datetime-local" name="deadline" class="form-input">
            </div>

            <div class="form-group">
                <label class="form-label">Expiry</label>
                <input type="datetime-local" name="expiry" class="form-input">
            </div>
        </div>

        <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
            <button type="submit" class="btn">Assign Test</button>
            <a href="/pipeline/{{ pipeline.id }}" class="btn-ghost">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
