{% extends "base_app.html" %}
{% block title %}Interview{% endblock %}
{% block main_class %}layout-list{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Interview Sessions</h1>
</div>

<div data-sync-table="sessions"
     data-sync-search-fields="candidateName,jobTitle"
     data-sync-archive-field="status"
     data-sync-archive-values="completed,cancelled"
     data-sync-default-sort="createdAt:desc"
     data-sync-filter-fields='[{"key":"status","label":"Status","type":"select","options":["pending","completed","cancelled"]},{"key":"templateName","label":"Template","type":"select","options":[{% for t in template_names %}"{{ t }}"{% if not loop.last %},{% endif %}{% endfor %}]},{"key":"candidateName","label":"Candidate","type":"text"},{"key":"position","label":"Position","type":"text"},{"key":"businessUnit","label":"Business Unit","type":"text"},{"key":"createdAt","label":"Date","type":"date"}]'
     data-sync-display-options='{"sort":[{"value":"createdAt:desc","label":"Newest first","type":"date"},{"value":"createdAt:asc","label":"Oldest first","type":"date"},{"value":"candidateName:asc","label":"Name A-Z"},{"value":"candidateName:desc","label":"Name Z-A"}],"group":[{"value":"status","label":"Status"},{"value":"templateName","label":"Template"}]}'>
    <div class="table-controls">
        <input type="text" data-table-search placeholder="Search candidate or job title..." class="table-search">
        <a href="/session/new" class="btn-icon sync-add-btn" title="New session" hx-boost="false"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></a>
    </div>
    <div class="sync-subcontrols">
        <button type="button" class="archive-pill">Show completed</button>
    </div>

    <div class="sync-table-wrap">
        <table class="table-clean">
            <tbody></tbody>
        </table>
        <span class="table-count"></span>
    </div>
</div>

<noscript>
    <p class="row-meta" style="padding:2rem; text-align:center;">JavaScript is required to load sessions.</p>
</noscript>

<script src="/static/cells.js?v=1"></script>
<script>
window.__syncConfig = {
    renderRow: function(r) {
        var name = r.candidateName || '—';
        var nameOpts = r.candidateId ? {link: '/candidate/' + r.candidateId} : null;
        return '<tr class="clickable-row" data-href="/session/' + r.id + '">' +
            C.person(name, (r.jobTitle || '') + ' · ' + (r.templateName || '—'), nameOpts) +
            C.compound([r.position, r.businessUnit]) +
            C.ratio(r.completedCount, r.interviewerCount) +
            C.badge(r.status) +
            C.action('session', r.id, r.commentCount) +
            C.date(r.createdAt) +
            '</tr>';
    },
    contextMenu: function(r, baseUrl) {
        var items = [];
        // Navigate
        if (r.candidateId) items.push({label: '↗ View candidate', href: '/candidate/' + r.candidateId});
        // Utility
        (r.interviewers || []).forEach(function(iv) {
            items.push({label: '⎘ Copy link · ' + iv.name, copy: baseUrl + '/i/' + iv.token});
        });
        // Mutate
        items.push({label: '✎ Edit session', href: '/session/' + r.id + '/edit'});
        // Destruct
        if (r.status === 'pending') items.push({label: '⊘ Cancel', href: '/session/' + r.id + '/cancel', confirm: 'Cancel this session?'});
        items.push({label: '✕ Delete', href: '/session/' + r.id + '/delete', confirm: 'Delete permanently?', 'delete': true});
        return items;
    },
    bulkActions: [
        {label: 'Cancel', action: 'cancel', confirm: 'Cancel selected sessions?'},
        {label: 'Delete', action: 'delete', confirm: 'Delete selected sessions permanently?', danger: true}
    ]
};
</script>
<script src="/static/sync-list.js?v=2"></script>
{% endblock %}
