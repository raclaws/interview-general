{% extends "base_app.html" %}
{% block title %}Interview{% endblock %}
{% block main_class %}layout-list{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Interview Sessions</h1>
    <a href="/session/new" class="btn">+ New Session</a>
</div>

<div data-sync-table="sessions"
     data-sync-search-fields="candidateName,jobTitle"
     data-sync-archive-field="status"
     data-sync-archive-values="completed,cancelled"
     data-sync-default-sort="createdAt:desc">
    <div class="table-controls">
        <input type="text" data-table-search placeholder="Search candidate or job title..." class="table-search">
        <select data-table-filter="status" class="table-filter">
            <option value="">All Status</option>
            <option value="pending">Pending</option>
            <option value="completed">Completed</option>
            <option value="cancelled">Cancelled</option>
        </select>
        <select data-table-filter="templateName" class="table-filter">
            <option value="">All Templates</option>
            {% for t in template_names %}
            <option value="{{ t }}">{{ t }}</option>
            {% endfor %}
        </select>
        <select data-table-sort class="table-filter">
            <option value="">Sort</option>
            <option value="createdAt:desc" data-sort-type="date">Newest first</option>
            <option value="createdAt:asc" data-sort-type="date">Oldest first</option>
            <option value="candidateName:asc" data-sort-type="string">Name A-Z</option>
            <option value="candidateName:desc" data-sort-type="string">Name Z-A</option>
        </select>
        <select data-table-groupby class="table-filter">
            <option value="">Group by</option>
            <option value="status">Status</option>
            <option value="templateName">Template</option>
        </select>
        <button type="button" class="archive-pill">Show completed</button>
        <span class="table-count"></span>
    </div>

    <div class="sync-table-wrap">
        <table class="table-clean">
            <tbody></tbody>
        </table>
    </div>
</div>

<noscript>
    <p class="row-meta" style="padding:2rem; text-align:center;">JavaScript is required to load sessions.</p>
</noscript>

<script>
window.__syncConfig = {
    renderRow: function(r) {
        var name = r.candidateName || '—';
        var nameHtml = r.candidateId
            ? '<a href="/candidate/' + r.candidateId + '">' + name + '</a>'
            : name;
        var date = r.createdAt ? new Date(r.createdAt).toLocaleDateString() : '';
        return '<tr class="clickable-row" data-href="/session/' + r.id + '">' +
            '<td><div class="col-primary">' + nameHtml + '</div>' +
            '<div class="row-meta">' + (r.jobTitle || '') + ' · ' + (r.templateName || '—') + '</div></td>' +
            '<td class="row-meta">' + (r.position || '—') + ' · ' + (r.businessUnit || '—') + '</td>' +
            '<td>' + (r.completedCount || 0) + '/' + (r.interviewerCount || 0) + '</td>' +
            '<td><span class="badge badge-' + r.status + '">' + r.status + '</span></td>' +
            '<td class="row-meta" style="text-align:right;">' + date + '</td>' +
            '</tr>';
    },
    contextMenu: function(r, baseUrl) {
        var items = [];
        (r.interviewers || []).forEach(function(iv) {
            items.push({label: '⎘ Copy link · ' + iv.name, copy: baseUrl + '/i/' + iv.token});
        });
        if (r.candidateId) items.push({label: '↗ View candidate', href: '/candidate/' + r.candidateId});
        items.push({label: '✎ Edit session', href: '/session/' + r.id + '/edit'});
        if (r.status === 'pending') items.push({label: '⊘ Cancel', href: '/session/' + r.id + '/cancel', confirm: 'Cancel this session?'});
        items.push({label: '✕ Delete', href: '/session/' + r.id + '/delete', confirm: 'Delete permanently?', 'delete': true});
        return items;
    }
};
</script>
<script src="/static/sync-list.js?v=1"></script>
{% endblock %}
