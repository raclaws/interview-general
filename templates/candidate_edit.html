{% extends "base_app.html" %}
{% block title %}Edit {{ candidate.name }}{% endblock %}
{% block breadcrumb %}
<nav class="breadcrumb">
    <a href="/candidate/{{ candidate.id }}">{{ candidate.name }}</a> / <span>Edit</span>
</nav>
{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Edit Candidate</h1>
</div>

<div class="form-card">
    <form method="post" action="/candidate/{{ candidate.id }}/edit">
        <div class="form-row form-row--2col">
            <div class="form-field">
                <label class="form-label">Name <span class="required">*</span></label>
                <input type="text" name="name" value="{{ candidate.name }}" required class="form-input">
            </div>
            <div class="form-field">
                <label class="form-label">Email <span class="required">*</span></label>
                <input type="email" name="email" value="{{ candidate.email }}" required class="form-input">
            </div>
        </div>

        <div class="form-row form-row--2col">
            <div class="form-field">
                <label class="form-label">Phone</label>
                <input type="text" name="phone" value="{{ candidate.phone or '' }}" class="form-input">
            </div>
            <div class="form-field">
                <label class="form-label">Current Position</label>
                <input type="text" name="current_position" value="{{ candidate.current_position or '' }}" class="form-input">
            </div>
        </div>

        <div class="form-row form-row--2col">
            <div class="form-field">
                <label class="form-label">Years of Experience</label>
                <input type="text" name="yoe" value="{{ candidate.yoe or '' }}" class="form-input">
            </div>
            <div class="form-field">
                <label class="form-label">Languages</label>
                <input type="text" name="languages" value="{{ candidate.languages or '' }}" class="form-input">
            </div>
        </div>

        <div class="form-row form-row--2col">
            <div class="form-field">
                <label class="form-label">Cloud</label>
                <input type="text" name="cloud" value="{{ candidate.cloud or '' }}" class="form-input">
            </div>
            <div class="form-field">
                <label class="form-label">Tools</label>
                <input type="text" name="tools" value="{{ candidate.tools or '' }}" class="form-input">
            </div>
        </div>

        <div class="form-row form-row--2col">
            <div class="form-field">
                <label class="form-label">Working Arrangement</label>
                <input type="text" name="working_arrangement" value="{{ candidate.working_arrangement or '' }}" class="form-input">
            </div>
            <div class="form-field">
                <label class="form-label">Notice Period</label>
                <input type="text" name="notice_period" value="{{ candidate.notice_period or '' }}" class="form-input">
            </div>
        </div>

        <div class="form-row form-row--2col">
            <div class="form-field">
                <label class="form-label">Current Salary</label>
                <input type="text" name="current_salary" value="{{ candidate.current_salary or '' }}" class="form-input">
            </div>
            <div class="form-field">
                <label class="form-label">Expected Salary</label>
                <input type="text" name="expected_salary" value="{{ candidate.expected_salary or '' }}" class="form-input">
            </div>
        </div>

        <div class="form-field">
            <label class="form-label">CV / Resume Link</label>
            <input type="url" name="cv_link" value="{{ candidate.cv_link or '' }}" class="form-input" placeholder="https://...">
        </div>

        <div class="form-footer">
            <button type="submit" class="btn">Save Changes</button>
            <a href="/candidate/{{ candidate.id }}" class="btn-ghost">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
